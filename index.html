<html lang="en">
<head>
  <meta charset="UTF-8" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #F97316;
      --orange-dark: #EA580C;
      --orange-light: #FFF7ED;
      --black: #0F0F0F;
      --white: #FFFFFF;
      --gray: #6B7280;
      --gray-light: #F9FAFB;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--white);
      color: var(--black);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 24px 80px;
    }

    .container {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* Avatar */
    .avatar-wrap {
      position: relative;
      margin-bottom: 28px;
    }

    .avatar-ring {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 3px solid var(--orange);
      padding: 4px;
      background: white;
    }

    .avatar-ring img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      object-position: top center;
      display: block;
    }

    .avatar-badge {
      position: absolute;
      bottom: 2px;
      right: 2px;
      width: 26px;
      height: 26px;
      background: var(--orange);
      border-radius: 50%;
      border: 2px solid white;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .avatar-badge svg {
      width: 12px;
      height: 12px;
      fill: white;
    }

    /* Name & bio */
    .name {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
      text-align: center;
      line-height: 1.1;
      margin-bottom: 8px;
    }

    .name span {
      color: var(--orange);
    }

    .tagline {
      font-size: 14px;
      color: var(--gray);
      font-weight: 400;
      text-align: center;
      margin-bottom: 32px;
      letter-spacing: 0.2px;
    }

    /* Divider */
    .divider {
      width: 40px;
      height: 3px;
      background: var(--orange);
      border-radius: 99px;
      margin-bottom: 32px;
    }

    /* Links */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 40px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      padding: 16px 20px;
      border-radius: 14px;
      text-decoration: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      color: var(--black);
      background: var(--gray-light);
      border: 1.5px solid transparent;
      transition: all 0.2s ease;
      cursor: pointer;
    }

    .link-btn:hover {
      background: var(--orange-light);
      border-color: var(--orange);
      color: var(--orange-dark);
      transform: translateY(-1px);
    }

    .link-btn .icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: var(--white);
      border: 1.5px solid #E5E7EB;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s ease;
    }

    .link-btn:hover .icon {
      border-color: var(--orange);
      background: var(--orange);
    }

    .link-btn:hover .icon svg {
      fill: white;
      stroke: white;
    }

    .icon svg {
      width: 18px;
      height: 18px;
      fill: var(--black);
      transition: all 0.2s ease;
    }

    .link-btn .label {
      flex: 1;
    }

    .link-btn .arrow {
      font-size: 18px;
      color: #D1D5DB;
      transition: all 0.2s ease;
    }

    .link-btn:hover .arrow {
      color: var(--orange);
      transform: translateX(2px);
    }

    /* Footer */
    .footer {
      font-size: 12px;
      color: #D1D5DB;
      text-align: center;
      font-weight: 400;
      letter-spacing: 0.3px;
    }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .avatar-wrap { animation: fadeUp 0.5s ease both; }
    .name { animation: fadeUp 0.5s ease 0.1s both; }
    .tagline { animation: fadeUp 0.5s ease 0.15s both; }
    .divider { animation: fadeUp 0.5s ease 0.2s both; }
    .link-btn:nth-child(1) { animation: fadeUp 0.5s ease 0.25s both; }
    .link-btn:nth-child(2) { animation: fadeUp 0.5s ease 0.3s both; }
    .link-btn:nth-child(3) { animation: fadeUp 0.5s ease 0.35s both; }
    .link-btn:nth-child(4) { animation: fadeUp 0.5s ease 0.4s both; }
    .link-btn:nth-child(5) { animation: fadeUp 0.5s ease 0.45s both; }
    .footer { animation: fadeUp 0.5s ease 0.5s both; }
  </style>
</head>
