<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Webinaire Gratuit : Apprenez à Investir de Zéro — Ataa Soulami</title>
  <link rel="icon" type="image/png" href="MVI.png" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script type="text/javascript">
    (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window, document, "clarity", "script", "x80yu0fxl0");
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #F97316;
      --orange-dark: #EA580C;
      --black: #0F0F0F;
      --white: #FFFFFF;
      --gray: #6B7280;
      --gray-light: #F9FAFB;
      --border: #E5E7EB;
    }

    html {
      scroll-behavior: smooth;
      height: 100%;
    }

    body {
      margin: 0;
      font-family: 'DM Sans', sans-serif;
      background: radial-gradient(circle at top, rgba(249,115,22,0.16), transparent 32%), var(--white);
      color: var(--black);
      min-height: 100vh;
    }

    .page-header {
      --banner-height: 100px;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 9999;
      width: 100vw;
      padding: 20px 24px;
      min-height: var(--banner-height);
      background: linear-gradient(90deg, rgba(255,133,47,1) 0%, rgba(241,97,16,1) 100%);
      color: var(--white);
      font-family: 'Poppins', sans-serif;
      font-size: 15px;
      font-weight: 700;
      text-align: center;
      letter-spacing: 0.4px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.12);
    }

    .page-header span {
      display: inline-block;
      max-width: 900px;
      line-height: 1.3;
    }

    .page-header span {
      display: block;
      opacity: 0.98;
    }

    main {
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
      padding: calc(var(--banner-height) + env(safe-area-inset-top, 16px) + 16px) 24px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
    }

    /* Headline section */
    .hero {
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 22px;
      align-items: center;
    }

    h1 {
      font-family: 'Poppins', sans-serif;
      font-size: clamp(34px, 7vw, 52px);
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -0.8px;
      color: var(--black);
      max-width: 520px;
      text-shadow: 0 14px 36px rgba(249, 115, 22, 0.08);
    }

    .scroll-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px 28px;
      background: linear-gradient(90deg, #FFFFFF, #FFF7EF);
      color: var(--orange-dark);
      border: 2px solid rgba(249, 115, 22, 0.25);
      border-radius: 999px;
      font-family: 'Poppins', sans-serif;
      font-size: 15px;
      font-weight: 800;
      text-decoration: none;
      box-shadow: 0 12px 30px rgba(249, 115, 22, 0.12);
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .scroll-btn:hover {
      transform: translateY(-2px);
      background: #fff;
      box-shadow: 0 16px 34px rgba(249, 115, 22, 0.18);
    }

    .photo-wrap {
      position: relative;
      width: 160px;
      height: 160px;
      border-radius: 50%;
      overflow: hidden;
      border: 5px solid #fff;
      box-shadow: 0 14px 40px rgba(249, 115, 22, 0.18);
      flex-shrink: 0;
      background: linear-gradient(180deg, rgba(249,115,22,0.16), transparent 42%);
    }

    .photo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center center;
      display: block;
      background: #fff;
    }

    .subheadline {
      display: none;
    }

    .benefits {
      display: none;
    }

    /* Promise */
    .webinar-banner {
      --banner-height: 96px;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      width: 100%;
      padding: 18px 24px;
      min-height: var(--banner-height);
      border-radius: 0;
      background: linear-gradient(90deg, rgba(249,115,22,1) 0%, rgba(234,88,12,1) 100%);
      color: var(--white);
      font-family: 'Poppins', sans-serif;
      font-size: 14px;
      font-weight: 700;
      text-align: center;
      letter-spacing: 0.4px;
      box-shadow: 0 8px 24px rgba(249, 115, 22, 0.18);
    }

    .webinar-banner span {
      display: block;
      opacity: 0.95;
    }

    .photo-wrap {
      position: relative;
      width: 160px;
      height: 160px;
      border-radius: 50%;
      overflow: hidden;
      border: 4px solid var(--orange);
      box-shadow: 0 10px 28px rgba(249, 115, 22, 0.22);
      flex-shrink: 0;
      background: #fff;
    }

    .photo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center center;
      display: block;
      transform: none;
      background: #fff;
    }

    /* Benefits */
    .benefits {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .benefit-item {
      display: flex;
      gap: 14px;
      align-items: flex-start;
      font-size: 15px;
      line-height: 1.65;
      color: #374151;
    }

    .benefit-icon {
      flex-shrink: 0;
      width: 24px;
      height: 24px;
      background: var(--orange);
      color: var(--white);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      margin-top: 2px;
    }

    /* Promise */
    .promise {
      background: var(--gray-light);
      border-radius: 16px;
      padding: 28px 24px;
      border-left: 4px solid var(--orange);
      width: 100%;
    }

    .promise p {
      font-size: 15px;
      line-height: 1.75;
      color: #374151;
      font-weight: 500;
    }

    /* Form */
    .form-section {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 24px;
      background: var(--gray-light);
      border-radius: 16px;
      padding: 40px 28px;
    }

    .form-title {
      font-family: 'Poppins', sans-serif;
      font-size: 18px;
      font-weight: 700;
      text-align: center;
      color: var(--black);
    }

    .webinar-date {
      text-align: center;
      font-size: 14px;
      color: var(--gray);
      font-weight: 600;
      padding: 12px 16px;
      background: var(--white);
      border-radius: 10px;
      border: 1px solid var(--border);
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-size: 13px;
      font-weight: 600;
      color: var(--black);
      letter-spacing: 0.2px;
    }

    input {
      padding: 14px 16px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: var(--black);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      outline: none;
      border-color: var(--orange);
      box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.1);
    }

    input::placeholder {
      color: #D1D5DB;
    }

    .cta-btn {
      display: block;
      width: 100%;
      padding: 16px 28px;
      background: var(--orange);
      color: var(--white);
      font-family: 'Poppins', sans-serif;
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
      letter-spacing: 0.2px;
    }

    .cta-btn:hover {
      background: var(--orange-dark);
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(249, 115, 22, 0.3);
    }

    .cta-btn:active {
      transform: translateY(0);
    }

    .form-microcopy {
      text-align: center;
      font-size: 12px;
      color: var(--gray);
      line-height: 1.5;
    }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .hero { animation: fadeUp 0.5s ease both; }
    .photo-wrap { animation: fadeUp 0.5s ease 0.1s both; }
    .benefits { animation: fadeUp 0.5s ease 0.2s both; }
    .promise { animation: fadeUp 0.5s ease 0.3s both; }
    .form-section { animation: fadeUp 0.5s ease 0.4s both; }

    /* Mobile */
    @media (max-width: 480px) {
      main {
        padding: calc(var(--banner-height) + env(safe-area-inset-top, 16px) + 12px) 20px 28px;
        gap: 32px;
      }

      h1 {
        font-size: 28px;
      }

      .photo-wrap {
        width: 120px;
        height: 120px;
      }

      .form-section {
        padding: 32px 20px;
      }

      .cta-btn {
        padding: 14px 24px;
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <header class="page-header">
    <span>29 juin · 20h00 heure de Casablanca · Webinaire GRATUIT</span>
  </header>
  <main>

    <!-- Headline & Photo -->
    <div class="hero">
      <h1>Investissez mieux, plus vite, sans prise de tête.</h1>

      <a class="scroll-btn" href="#signup">Je m'inscris</a>

      <div class="photo-wrap">
        <img src="photo.png" alt="Ataa Soulami" />
      </div>
    </div>

    <!-- Promise -->
    <div class="promise">
      <p>Vous n'avez pas besoin d'être riche pour investir. Vous avez besoin de commencer — et de savoir comment. C'est exactement ce que je vais vous montrer.</p>
    </div>

    <!-- Form -->
    <div class="form-section" id="signup">
      <iframe data-tally-src="https://tally.so/embed/7RjrLL?alignLeft=1&hideTitle=1&transparentBackground=1&dynamicHeight=1" width="100%" height="100%" style="border: none; border-radius: 12px;"></iframe>
    </div>

  </main>

  <script src="https://tally.so/widgets/embed.js"></script>
</body>
</html>
